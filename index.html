<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[App Name] - Modern App Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-3xl w-full text-center space-y-8 bg-white p-12 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            
            <h1 class="text-5xl font-bold tracking-tight text-slate-900">
                Welcome to <span class="gradient-text">[App Name]</span>
            </h1>
            
            <p class="text-lg text-slate-500 max-w-xl mx-auto leading-relaxed">
                Seamlessly connect and supercharge your workflow. This page serves as the official portal for our integration policies.
            </p>

            <div class="flex flex-col sm:flex-row justify-center gap-4 pt-6">
                <a href="terms.html" class="px-8 py-3 rounded-full bg-slate-900 text-white font-semibold hover:bg-slate-800 transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                    Terms of Service
                </a>
                <a href="privacy.html" class="px-8 py-3 rounded-full bg-white text-slate-900 border border-slate-200 font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5">
                    Privacy Policy
                </a>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-sm">
        &copy; 2026 [App Name]. All rights reserved.
    </footer>

</body>
</html>
